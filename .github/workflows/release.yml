name: Release (Tauri)

# - push to a v* tag        → full build + upload to GitHub Release (draft)
# - push to main            → CI build only (no release upload), verifies Linux + Windows still compile
# - manual workflow_dispatch → same as the "main" branch run
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      # tauri-action updates latest.json by reading the existing release asset,
      # adding the current platform, then uploading it again. Keep release builds
      # serialized so Linux and Windows do not race and overwrite each other's
      # updater platform entry.
      max-parallel: 1
      matrix:
        include:
          - platform: ubuntu-24.04
            args: '--bundles appimage,deb'
            label: 'Linux (x86_64)'
            rust-target: ''
          - platform: windows-latest
            args: '--bundles msi'
            label: 'Windows (x86_64)'
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Keep CI cache hot across main pushes; release builds reuse it too.
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install JS deps
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Tag push → sync version in package.json / tauri.conf.json / Cargo.toml
      # with the tag, so artifact filenames (TaskForge_X.Y.Z_*.msi etc.) always
      # match the released tag. Source files in main can lag behind — CI wins.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.\-]+)?$ ]]; then
            echo "::error::Tag '$REF_NAME' is not valid semver. Expected vX.Y.Z[-suffix]."
            exit 1
          fi
          echo "Syncing version to $VERSION"

          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version=process.argv[1]; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');" "$VERSION"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); p.version=process.argv[1]; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');" "$VERSION"

          # Cargo.toml [package].version — only the top-level bare `version = "X"`
          # line; inline-table versions inside [dependencies] aren't anchored to
          # column 0, so the ^ anchor leaves them alone.
          sed -i.bak -E "s/^version = \"[^\"]+\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "package.json:      $(node -p "require('./package.json').version")"
          echo "tauri.conf.json:   $(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "Cargo.toml:        $(grep -E '^version' src-tauri/Cargo.toml)"

      # GH Actions secret substitution into `env:` mappings drops newlines from
      # multi-line values — confirmed by repro: a secret stored with newlines
      # via `gh secret set < file` reaches the runner with newlines stripped,
      # so a raw minisign .key file (which has a header line + base64 line)
      # collapses into one line and Tauri's parser rejects it.
      #
      # Workaround: store the secret as single-line base64 of the .key file
      # (no newlines in the secret value, safe transport), then on the runner
      # decode it and publish the multi-line raw content via $GITHUB_ENV
      # heredoc — that mechanism preserves newlines, unlike `env:` mapping.
      # Subsequent steps see TAURI_SIGNING_PRIVATE_KEY with the full multi-line
      # value, identical to what local `signer sign` consumes.
      - name: Materialize updater signing key (multi-line env)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_B64:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY repository secret."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret."
            exit 1
          fi
          # Decode the secret. It must be single-line base64 of the .key file.
          # Decoded content must begin with `untrusted comment:` (raw minisign).
          DECODED="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 -d 2>/dev/null || true)"
          if [ -z "$DECODED" ] || ! printf '%s' "$DECODED" | head -1 | grep -q '^untrusted comment:'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be single-line base64 of the .key file. Update with: base64 -i ~/.tauri/taskforge.key | tr -d '\\n' | gh secret set TAURI_SIGNING_PRIVATE_KEY -R <owner>/<repo>"
            exit 1
          fi
          BYTES="$(printf '%s' "$DECODED" | wc -c | tr -d ' ')"
          # Publish multi-line value via $GITHUB_ENV heredoc — the documented
          # mechanism that preserves newlines across steps.
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY_EOF__"
            printf '%s' "$DECODED"
            echo
            echo "__TAURI_KEY_EOF__"
          } >> "$GITHUB_ENV"
          echo "Decoded signing key ($BYTES bytes) published to GITHUB_ENV with newlines preserved."

      # Tag push → produce a real Release with installers attached.
      # TAURI_SIGNING_PRIVATE_KEY comes from $GITHUB_ENV (set by the previous
      # step with newlines intact); TAURI_SIGNING_PRIVATE_KEY_PASSWORD comes
      # directly from secrets. With both set and includeUpdaterJson: true,
      # tauri-action signs each bundle and writes latest.json to the release.
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: TaskForge ${{ env.TAG_NAME }}
          releaseBody: |
            ## TaskForge

            Wersja desktopowa zbudowana lokalnie dla Twojego systemu.

            - **Windows** — `.msi` (x86_64)
            - **Linux** — `.AppImage` lub `.deb` (x86_64)

            Aplikacja sama sprawdzi aktualizacje przy starcie i zaproponuje
            instalację nowej wersji (Windows MSI, Linux AppImage).

            Wersja webowa: https://taskforge-eta-cyan.vercel.app

            ---
            Wygenerowano automatycznie przez GitHub Actions.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          retryAttempts: 2
          args: ${{ matrix.args }}

      # main push / manual run → just verify the build compiles on every platform.
      # No tagName means tauri-action skips the release-upload step.
      - name: Build Tauri app (CI verify)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          retryAttempts: 2
          args: ${{ matrix.args }} --config {"bundle":{"createUpdaterArtifacts":false}}

      # Windows-only: package a portable single-exe build alongside the installer.
      # Tauri produces the raw exe at src-tauri/target/release/<name>.exe — we just
      # zip it with a short readme. The user runs the .exe directly, no install.
      - name: Package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p portable-payload
          # Tauri's exe name follows productName casing (TaskForge)
          if [ -f src-tauri/target/release/TaskForge.exe ]; then
            cp src-tauri/target/release/TaskForge.exe portable-payload/TaskForge.exe
          elif [ -f src-tauri/target/release/taskforge.exe ]; then
            cp src-tauri/target/release/taskforge.exe portable-payload/TaskForge.exe
          else
            echo "Could not find built .exe in src-tauri/target/release/"
            ls -la src-tauri/target/release/ || true
            exit 1
          fi

          cat > portable-payload/README.txt <<'EOF'
          TaskForge — wersja portable
          ============================
          Uruchamianie: kliknij dwa razy TaskForge.exe.
          Nie wymaga instalacji.

          Wymagania:
            - Windows 10 (1809) lub nowszy
            - Microsoft Edge WebView2 Runtime (preinstalowany w Windows 11
              oraz w Windows 10 od 2021 r. — w razie braku pobierz z:
              https://developer.microsoft.com/microsoft-edge/webview2/)

          Dane lokalne (zadania, kategorie, ustawienia) są zapisywane przez
          WebView2 w katalogu profilu użytkownika Windows. Przenosząc plik
          .exe na inny komputer baza pozostanie na poprzednim — eksport/import
          wykonaj z poziomu aplikacji (zakładka „Eksport / Import").
          EOF

          7z a -tzip TaskForge-portable-x64.zip ./portable-payload/*
          ls -la TaskForge-portable-x64.zip

      # Upload the build artefacts so a maintainer can grab them from any push,
      # even before tagging a release. Skipped on tag pushes (assets are already on the Release).
      - name: Upload installers as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: TaskForge-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            TaskForge-portable-x64.zip
          if-no-files-found: ignore
          retention-days: 14

      # On tag push: append the portable zip to the existing draft Release.
      - name: Upload portable zip to Release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          # tauri-action created/updated the release in this same job earlier; append our zip.
          gh release upload "$TAG_NAME" TaskForge-portable-x64.zip --clobber
