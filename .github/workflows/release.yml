name: Release (Tauri)

# - push to a v* tag        → full build + upload to GitHub Release (draft)
# - push to main            → CI build only (no release upload), verifies all 4 platforms still compile
# - manual workflow_dispatch → same as the "main" branch run
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: "macOS (Apple Silicon)"
            rust-target: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: "macOS (Intel)"
            rust-target: "x86_64-apple-darwin"
          - platform: ubuntu-24.04
            args: ""
            label: "Linux (x86_64)"
            rust-target: ""
          - platform: windows-latest
            args: ""
            label: "Windows (x86_64)"
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Keep CI cache hot across main pushes; release builds reuse it too.
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install JS deps
        run: npm ci

      # Tag push → produce a real Release with installers attached.
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: TaskForge ${{ env.TAG_NAME }}
          releaseBody: |
            ## TaskForge

            Wersja desktopowa zbudowana lokalnie dla Twojego systemu.

            - **macOS** — `.dmg` (Apple Silicon: `aarch64`, Intel: `x64`)
            - **Windows** — `.msi` (x86_64)
            - **Linux** — `.AppImage` lub `.deb` (x86_64)

            Wersja webowa: https://taskforge-eta-cyan.vercel.app

            ---
            Wygenerowano automatycznie przez GitHub Actions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # main push / manual run → just verify the build compiles on every platform.
      # No tagName means tauri-action skips the release-upload step.
      - name: Build Tauri app (CI verify)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Upload the build artefacts so a maintainer can grab them from any push,
      # even before tagging a release. Skipped on tag pushes (assets are already on the Release).
      - name: Upload installers as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: TaskForge-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: ignore
          retention-days: 14
