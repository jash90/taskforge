name: Release (Tauri)

# - push to a v* tag        → full build + upload to GitHub Release (draft)
# - push to main            → CI build only (no release upload), verifies Linux + Windows still compile
# - manual workflow_dispatch → same as the "main" branch run
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
            label: 'Linux (x86_64)'
            rust-target: ''
          - platform: windows-latest
            args: ''
            label: 'Windows (x86_64)'
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Keep CI cache hot across main pushes; release builds reuse it too.
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install JS deps
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Tag push → sync version in package.json / tauri.conf.json / Cargo.toml
      # with the tag, so artifact filenames (TaskForge_X.Y.Z_*.msi etc.) always
      # match the released tag. Source files in main can lag behind — CI wins.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.\-]+)?$ ]]; then
            echo "::error::Tag '$REF_NAME' is not valid semver. Expected vX.Y.Z[-suffix]."
            exit 1
          fi
          echo "Syncing version to $VERSION"

          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version=process.argv[1]; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');" "$VERSION"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); p.version=process.argv[1]; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');" "$VERSION"

          # Cargo.toml [package].version — only the top-level bare `version = "X"`
          # line; inline-table versions inside [dependencies] aren't anchored to
          # column 0, so the ^ anchor leaves them alone.
          sed -i.bak -E "s/^version = \"[^\"]+\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "package.json:      $(node -p "require('./package.json').version")"
          echo "tauri.conf.json:   $(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "Cargo.toml:        $(grep -E '^version' src-tauri/Cargo.toml)"

      # Tag push → produce a real Release with installers attached.
      # Signing env vars are required for the Tauri updater: tauri-action
      # signs each bundle and writes latest.json (the updater manifest)
      # only when both TAURI_SIGNING_PRIVATE_KEY and the matching password
      # are present and `includeUpdaterJson: true` is set.
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: TaskForge ${{ env.TAG_NAME }}
          releaseBody: |
            ## TaskForge

            Wersja desktopowa zbudowana lokalnie dla Twojego systemu.

            - **Windows** — `.msi` (x86_64)
            - **Linux** — `.AppImage` lub `.deb` (x86_64)

            Aplikacja sama sprawdzi aktualizacje przy starcie i zaproponuje
            instalację nowej wersji (Windows MSI, Linux AppImage).

            Wersja webowa: https://taskforge-eta-cyan.vercel.app

            ---
            Wygenerowano automatycznie przez GitHub Actions.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # main push / manual run → just verify the build compiles on every platform.
      # No tagName means tauri-action skips the release-upload step.
      - name: Build Tauri app (CI verify)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Windows-only: package a portable single-exe build alongside the installer.
      # Tauri produces the raw exe at src-tauri/target/release/<name>.exe — we just
      # zip it with a short readme. The user runs the .exe directly, no install.
      - name: Package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p portable-payload
          # Tauri's exe name follows productName casing (TaskForge)
          if [ -f src-tauri/target/release/TaskForge.exe ]; then
            cp src-tauri/target/release/TaskForge.exe portable-payload/TaskForge.exe
          elif [ -f src-tauri/target/release/taskforge.exe ]; then
            cp src-tauri/target/release/taskforge.exe portable-payload/TaskForge.exe
          else
            echo "Could not find built .exe in src-tauri/target/release/"
            ls -la src-tauri/target/release/ || true
            exit 1
          fi

          cat > portable-payload/README.txt <<'EOF'
          TaskForge — wersja portable
          ============================
          Uruchamianie: kliknij dwa razy TaskForge.exe.
          Nie wymaga instalacji.

          Wymagania:
            - Windows 10 (1809) lub nowszy
            - Microsoft Edge WebView2 Runtime (preinstalowany w Windows 11
              oraz w Windows 10 od 2021 r. — w razie braku pobierz z:
              https://developer.microsoft.com/microsoft-edge/webview2/)

          Dane lokalne (zadania, kategorie, ustawienia) są zapisywane przez
          WebView2 w katalogu profilu użytkownika Windows. Przenosząc plik
          .exe na inny komputer baza pozostanie na poprzednim — eksport/import
          wykonaj z poziomu aplikacji (zakładka „Eksport / Import").
          EOF

          7z a -tzip TaskForge-portable-x64.zip ./portable-payload/*
          ls -la TaskForge-portable-x64.zip

      # Upload the build artefacts so a maintainer can grab them from any push,
      # even before tagging a release. Skipped on tag pushes (assets are already on the Release).
      - name: Upload installers as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: TaskForge-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            TaskForge-portable-x64.zip
          if-no-files-found: ignore
          retention-days: 14

      # On tag push: append the portable zip to the existing draft Release.
      - name: Upload portable zip to Release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          # tauri-action created/updated the release in this same job earlier; append our zip.
          gh release upload "$TAG_NAME" TaskForge-portable-x64.zip --clobber
