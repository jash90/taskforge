<!DOCTYPE html>
<html lang="pl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#231b13" media="(prefers-color-scheme: dark)" />
    <title>TaskForge — Parametryzowane zadania edukacyjne</title>
    <meta name="description" content="System zarządzania parametryzowanymi zadaniami edukacyjnymi z klasyfikacją podstawy programowej" />
    <script>
      // Apply persisted/system theme before first paint to prevent flash.
      (function () {
        try {
          var stored = localStorage.getItem('taskforge.theme');
          var pref = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          document.documentElement.dataset.theme = resolved;
        } catch (_) { /* ignore */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* Noto Sans/Serif — pełne wsparcie polskich diakrytyków i znaków
         matematycznych (≥ ≤ ⋅ × ÷ ²), priorytet dla treści edukacyjnych. */
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap');
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
